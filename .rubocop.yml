AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  SuggestExtensions: false

plugins:
  - rubocop-performance
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Naming/AccessorMethodName:
  Enabled: false
Naming/MemoizedInstanceVariableName:
  Enabled: false
Style/Documentation:
  Enabled: false
